name: Java Review

on:
  pull_request:

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install reviewdog
        uses: reviewdog/action-setup@v1

      # CHECKSTYLE
      - name: Run Checkstyle
        run: |
          wget https://github.com/checkstyle/checkstyle/releases/download/checkstyle-10.12.4/checkstyle-10.12.4-all.jar
          
          # Find all Java files
          FILES=$(git ls-files '*.java')
          
          # Run checkstyle
          java -jar checkstyle-10.12.4-all.jar \
            -c .github/checkstyle.xml \
            -f xml $FILES > checkstyle-result.xml || true
          
          # If file empty, create dummy XML so reviewdog doesn't crash
          if [ ! -s checkstyle-result.xml ]; then
            echo '<?xml version="1.0"?><checkstyle version="10.0"></checkstyle>' > checkstyle-result.xml
          fi

      - name: Reviewdog Checkstyle
        run: |
          cat checkstyle-result.xml | reviewdog -f=checkstyle -reporter=github-pr-review -level=warning
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}