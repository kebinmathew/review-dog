name: Java Review

on:
  pull_request:

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Reviewdog
        uses: reviewdog/action-setup@v1

      - name: Download Checkstyle
        run: |
          wget https://github.com/checkstyle/checkstyle/releases/download/checkstyle-10.12.4/checkstyle-10.12.4-all.jar

      - name: Run Checkstyle
        run: |
          java -jar checkstyle-10.12.4-all.jar \
            -c .github/checkstyle.xml \
            -f xml \
            $(git ls-files '*.java') \
            > checkstyle-result.xml || true

          # Ensure XML exists even if no files
          if [ ! -s checkstyle-result.xml ]; then
            echo '<?xml version="1.0"?><checkstyle version="10.0"></checkstyle>' > checkstyle-result.xml
          fi

      - name: Reviewdog (Post PR Comments + Fail if Errors)
        run: |
          reviewdog -f=checkstyle \
            -name="java-review" \
            -reporter=github-pr-review \
            -level=error \
            -fail-on-error \
            < checkstyle-result.xml
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
